# AWS CloudFormation Deploy

name: AWS CloudFormation Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:  # Fixed concurrency
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Deploy
        run: aws cloudformation deploy --template-file template.yml --stack-name my-stack --capabilities CAPABILITY_NAMED_IAM