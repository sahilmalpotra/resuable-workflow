# ------------------------------------------------------------------------------
# AWS CloudFormation Deployment Workflow
# ------------------------------------------------------------------------------
name: AWS CFN Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: The environment to run cloudformation against (dev, qa, prd).
        required: true
        type: string
      account-id:
        description: The AWS account ID.
        required: true
        type: string
      region:
        description: "The AWS region where resources are located"
        required: true
        type: string
      role-name:
        description: "The name of the AWS IAM role to assume"
        required: true
        type: string
      stack-name:
        description: Name of the CloudFormation stack to deploy.
        required: true
        type: string
      template-file:
        description: Path to the local CloudFormation template file to deploy.
        required: true
        type: string
      parameters-file:
        description: >-
          Path to parameters file with parameter overrides.
          Can be used alone or with parameters-overrides.
        required: false
        type: string
        default: ""
      parameters-overrides:
        description: >-
          Parameter key-value pairs as comma-separated list.
          Format: "Key1=Value1,Key2=Value2"
        required: false
        type: string
        default: ""
      tags-file:
        description: Path to tags file to apply to the CloudFormation stack.
        required: true
        type: string
        default: ./tags.json
      capabilities:
        description: Comma-delimited list of stack capabilities. Defaults to 'CAPABILITY_IAM'
        required: false
        type: string
        default: "CAPABILITY_IAM"
      no-fail-on-empty-changeset:
        description: Whether to fail the workflow if no changes are detected.
        required: false
        type: string
        default: "1"
      timeout-minutes:
        description: The maximum time in minutes the workflow is allowed to run.
        required: false
        type: number
        default: 30

concurrency:
  group: ${{ inputs.account-id }}-${{ inputs.region }}-${{ inputs.stack-name }}
  cancel-in-progress: false

jobs:
  aws-cfn-deploy:
    name: AWS CFN Deploy
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        shell: bash

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Read Tags File
        id: read-tags
        run: |
          if [ -f "${{ inputs.tags-file }}" ]; then
            TAGS_CONTENT=$(cat "${{ inputs.tags-file }}" | tr -d '\n\r' | sed 's/ //g')
            echo "tags_content=$TAGS_CONTENT" >> $GITHUB_OUTPUT
          else
            echo "::warning::Tags file not found at: ${{ inputs.tags-file }}"
            echo "tags_content=" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Process Parameters File
        id: process-parameters
        run: |
          echo "::group::Parameters Processing"
          PARAMS_FILE="${{ github.workspace }}/combined-parameters.json"
          echo "[]" > "$PARAMS_FILE"

          if [ -n "${{ inputs.parameters-file }}" ] && [ -f "${{ inputs.parameters-file }}" ]; then
            if jq empty "${{ inputs.parameters-file }}" 2>/dev/null; then
              if [[ $(jq 'if type=="array" then true else false end' "${{ inputs.parameters-file }}") == "true" ]]; then
                cp "${{ inputs.parameters-file }}" "$PARAMS_FILE"
              else
                jq -r 'to_entries | map({"ParameterKey": .key, "ParameterValue": .value | tostring})' \
                  "${{ inputs.parameters-file }}" > "$PARAMS_FILE"
              fi
            else
              echo "::warning::Invalid JSON in parameters file."
            fi
          fi

          if [ -n "${{ inputs.parameters-overrides }}" ]; then
            TEMP_FILE="${{ github.workspace }}/params-temp.json"
            # Convert overrides logic...
            echo "${{ inputs.parameters-overrides }}" | tr ',' '\n' | jq -R 'split("=") | {ParameterKey: .[0], ParameterValue: .[1]}' | jq -s '.' > "$TEMP_FILE"
            
            jq -s 'add | group_by(.ParameterKey) | map(last)' "$PARAMS_FILE" "$TEMP_FILE" > "${PARAMS_FILE}.tmp" && mv "${PARAMS_FILE}.tmp" "$PARAMS_FILE"
          fi

          if [ -s "$PARAMS_FILE" ] && [ "$(jq 'length' "$PARAMS_FILE")" -gt 0 ]; then
            echo "parameters_path=file:///$PARAMS_FILE" >> $GITHUB_OUTPUT
          else
            echo "parameters_path=" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: arn:aws:iam::${{ inputs.account-id }}:role/${{ inputs.role-name }}
          role-duration-seconds: ${{ inputs.timeout-minutes * 60 }}

      - name: 🚀 Deploy CloudFormation Stack
        id: deploy-cfn
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ inputs.stack-name }}
          template: ${{ inputs.template-file }}
          parameter-overrides: ${{ steps.process-parameters.outputs.parameters_path }}
          no-fail-on-empty-changeset: ${{ inputs.no-fail-on-empty-changeset }}
          tags: ${{ steps.read-tags.outputs.tags_content }}
          capabilities: ${{ inputs.capabilities }}
          disable-rollback: "1"